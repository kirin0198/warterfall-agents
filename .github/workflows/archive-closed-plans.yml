name: Archive closed planning docs

# Auto-archive planning documents at PR-creation time so the archive
# move lands in the same PR as the work (instead of opening a follow-up
# PR after merge).
#
# Triggers:
#   - pull_request: opened       → first scan when PR is created
#   - pull_request: edited       → re-scan when PR body is edited
#                                  (e.g. user adds Closes #N later)
#   - pull_request: synchronize  → re-scan after new commits; idempotent
#                                  + actor filter prevents bot loops
#
# At trigger time the referenced issue may still be OPEN — we trust the
# `Closes #N` / `Fixes #N` / `Resolves #N` keyword as a commitment that
# merging this PR will close the issue (which GitHub does automatically).
# If the maintainer ultimately closes the PR without merging, the planning
# doc has to be moved back manually; that edge case is documented.

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  archive:
    # Skip on fork PRs (GITHUB_TOKEN is read-only there) and on commits
    # the bot itself pushed (loop prevention).
    if: |
      github.event.pull_request.head.repo.full_name == github.repository
      && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
      issues: read

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          persist-credentials: true

      - name: Scan PR body and stage moves
        id: scan
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        shell: bash
        run: |
          set -euo pipefail

          # Extract issue numbers from Closes/Fixes/Resolves keywords.
          mapfile -t referenced_issues < <(
            printf '%s\n' "$PR_BODY" \
              | grep -oiE '(close[sd]?|fix(es|ed)?|resolve[sd]?)[[:space:]]*#[0-9]+' \
              | grep -oE '#[0-9]+' \
              | tr -d '#' \
              | sort -u
          )

          if [ ${#referenced_issues[@]} -eq 0 ]; then
            echo "No Closes/Fixes/Resolves keywords in PR body. Nothing to archive."
            echo "moved=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Referenced issues: ${referenced_issues[*]}"

          # Idempotent search: only matches planning docs still in the active
          # directory. Already-archived docs cause a no-op (loop safety).
          moved=()
          for n in "${referenced_issues[@]}"; do
            for f in docs/design-notes/*.md; do
              [ -f "$f" ] || continue
              if head -n 20 "$f" | grep -qE "(GitHub Issue:|Issue) \[?#${n}\b"; then
                target="docs/design-notes/archived/$(basename "$f")"
                git mv "$f" "$target"
                echo "  archived: $f -> $target (issue #$n)"
                moved+=("$(basename "$f" .md):#${n}")
                break
              fi
            done
          done

          if [ ${#moved[@]} -eq 0 ]; then
            echo "No matching active planning docs found. Nothing to archive."
            echo "moved=" >> "$GITHUB_OUTPUT"
          else
            printf 'moved=%s\n' "$(IFS=,; echo "${moved[*]}")" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push to PR branch
        if: steps.scan.outputs.moved != ''
        env:
          MOVED: ${{ steps.scan.outputs.moved }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          moved_list=$(printf '%s\n' "$MOVED" | tr ',' '\n')

          commit_msg=$(printf 'chore: archive planning docs for issues this PR closes\n\nAuto-generated by archive-closed-plans.yml at PR-open time.\nThe planning docs below reference issues that are explicitly listed as\n"Closes/Fixes/Resolves" in PR #%s body. They are moved into\ndocs/design-notes/archived/ as part of this PR so the archive lives alongside\nthe work that ships it.\n\nMoved (slug:issue):\n%s\n\nIf this PR ends up closed without merging, the moves have to be reverted\nmanually. See docs/design-notes/archived/README.md.\n' "$PR_NUMBER" "$moved_list")

          git commit -m "$commit_msg"
          git push origin "HEAD:${PR_BRANCH}"
